name: rxtracker
description: Prescription reader and medicine tracker/reminder
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.2
  dio: ^5.7.0

  # Image picking (prescription scan)
  image_picker: ^1.1.2

  # Local notifications (reminders)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Date/time
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1

  # Calendar integration
  add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
